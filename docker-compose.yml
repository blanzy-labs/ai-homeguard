services:
  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: AI HomeGuard
      APP_VERSION: 0.1.0
      APP_ENV: local
      ENABLE_NETWORK_CHECKS: "false"
      ENABLE_AI_SUMMARY: "false"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
